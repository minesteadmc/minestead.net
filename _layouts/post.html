---
layout: default
---

<main>
  <div class="wrapper">
    <article class="post-article">

      <p class="post-back"><a href="/news">&laquo; Back to News</a></p>

      <div class="panel post-card">
        <div class="news-card-header">
          <h1 class="section-title">{{ page.title }}</h1>
          <span class="news-date">{{ page.date | date: "%B %-d, %Y" }}</span>
        </div>
        {% if page.header_image %}
        <img src="{{ page.header_image }}" alt="{{ page.title }}" class="post-header-image">
        {% endif %}
        <div class="post-body">
          {{ content }}
        </div>
      </div>

    </article>
  </div>
</main>
